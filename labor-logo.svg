<svg width="200" height="80" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="none" />

  <!-- Gradient for text -->
  <defs>
    <linearGradient id="bubbleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#76c7f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a86ff;stop-opacity:1" />
    </linearGradient>

    <!-- Highlight for glossy effect -->
    <radialGradient id="shineGradient" cx="30%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255, 255, 255, 0.7);" />
      <stop offset="100%" style="stop-color:rgba(255, 255, 255, 0);" />
    </radialGradient>
  </defs>

  <!-- Shadow behind the text -->
  <text x="50%" y="60%" dominant-baseline="middle" text-anchor="middle"
        font-family="Comic Sans MS, cursive, sans-serif"
        font-weight="bold"
        font-size="64"
        fill="rgba(0,0,0,0.2)">
    Labor
  </text>

  <!-- Bubbly main text -->
  <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle"
        font-family="Comic Sans MS, cursive, sans-serif"
        font-weight="bold"
        font-size="64"
        fill="url(#bubbleGradient)">
    Labor
  </text>
 
</svg>
